      var counts = {
        capacity_exhausted: 0,
        quota_exhausted: 0,
        rate_limited: 0,
        transient: 0,
        unknown: 0
      };

      active.forEach(function(mc) {
        var reason = mc.reason || (mc.quotaExhausted ? 'quota_exhausted' : 'unknown');
        if (!Object.prototype.hasOwnProperty.call(counts, reason)) {
          reason = 'unknown';
        }
        counts[reason] += 1;
      });

      var nonZeroReasons = Object.keys(counts).filter(function(key) {
        return counts[key] > 0;
      });

      var label = 'Model Hold';
      if (nonZeroReasons.length === 1) {
        if (counts.capacity_exhausted > 0) label = 'Model Busy';
        else if (counts.quota_exhausted > 0) label = 'Quota Cooldown';
        else if (counts.rate_limited > 0) label = 'Rate Limit';
        else if (counts.transient > 0) label = 'Temporary Hold';
      }

      var parts = [];
      if (counts.capacity_exhausted > 0) parts.push(counts.capacity_exhausted + ' busy');
      if (counts.quota_exhausted > 0) parts.push(counts.quota_exhausted + ' quota');
      if (counts.rate_limited > 0) parts.push(counts.rate_limited + ' rate-limited');
      if (counts.transient > 0) parts.push(counts.transient + ' transient');
      if (counts.unknown > 0) parts.push(counts.unknown + ' other');

      return {
        label: label,
        summary: parts.join(', ')
      };
    }

    function formatRelativeTime(value) {
      if (value == null) return '--';
      var ts = null;
      if (typeof value === 'number' && isFinite(value)) {
        ts = value;
      } else if (typeof value === 'string') {
        var parsed = Date.parse(value);
        if (!isNaN(parsed)) ts = parsed;
      }
      if (ts == null) return String(value);

      var diffMs = ts - Date.now();
      if (diffMs <= 0) return 'now';

      var totalSeconds = Math.floor(diffMs / 1000);
      var days = Math.floor(totalSeconds / 86400);
      var hours = Math.floor((totalSeconds % 86400) / 3600);
      var minutes = Math.floor((totalSeconds % 3600) / 60);
      var seconds = totalSeconds % 60;

      var parts = [];
      if (days > 0) parts.push(days + 'd');
      if (days > 0 || hours > 0) parts.push(hours + 'h');
      if (days > 0 || hours > 0 || minutes > 0) parts.push(minutes + 'm');
      parts.push(seconds + 's');

      return 'in ' + parts.join(' ');
    }

    function parseDateValue(value) {
      if (value == null) return null;
      if (typeof value === 'number' && isFinite(value)) {
        return value > 1e12 ? new Date(value) : new Date(value * 1000);
      }
      if (typeof value === 'string') {
        var trimmed = value.trim();
        if (!trimmed) return null;
        if (/^\d+$/.test(trimmed)) {
          var numeric = Number(trimmed);
          return new Date(numeric > 1e12 ? numeric : numeric * 1000);
        }
        var parsed = Date.parse(trimmed);
        if (!isNaN(parsed)) return new Date(parsed);
      }
      return null;
    }

    function formatDurationMs(value) {
      if (value == null || value === '' || !isFinite(Number(value))) return '--';
      var ms = Math.max(0, Math.round(Number(value)));
      if (ms < 1000) return ms + 'ms';
      var sec = ms / 1000;
      if (sec < 60) return (Math.round(sec * 10) / 10) + 's';
      var min = Math.floor(sec / 60);
      var remSec = Math.round((sec % 60) * 10) / 10;
      if (min < 60) return min + 'm ' + remSec + 's';
      var hr = Math.floor(min / 60);
      var remMin = min % 60;
      return hr + 'h ' + remMin + 'm';
    }

    function renderTokenHeatmap(data) {
      var container = document.getElementById('analytics-heatmap');
      if (!container) return;
      if (!data || !data.days || data.days.length === 0) {
        container.innerHTML = '';
        return;
      }

      var days = data.days;
      var availableWidth = Math.max(container.clientWidth || 0, 320);
      var leftPad = 30;
      var CELL = 13;
      var GAP = 3;
      var step = CELL + GAP;
      var minWeeks = 20;
      var maxWeeks = 53;
      var fitWeeks = Math.max(minWeeks, Math.floor((availableWidth - leftPad + GAP) / step));
      var minWeeksFromData = minWeeks;
      if (days.length > 0 && days[0].date) {
        var firstParts = String(days[0].date).split('-');
        if (firstParts.length === 3) {
          var firstDay = new Date(Number(firstParts[0]), Number(firstParts[1]) - 1, Number(firstParts[2]));
          firstDay.setHours(0, 0, 0, 0);
          var todayForSpan = new Date();
          todayForSpan.setHours(0, 0, 0, 0);
          var spanDays = Math.max(1, Math.floor((todayForSpan - firstDay) / 86400000) + 1);
          minWeeksFromData = Math.ceil(spanDays / 7);
        }
      }
      var WEEKS = Math.min(maxWeeks, Math.max(minWeeks, fitWeeks, minWeeksFromData));

      // Build date→tokens map
      var tokensByDate = {};
      var maxTokens = 0;
      for (var i = 0; i < days.length; i++) {
        var d = days[i];
        tokensByDate[d.date] = d;
        if (d.totalContextTokens > maxTokens) maxTokens = d.totalContextTokens;
      }

      // Generate grid: last WEEKS weeks ending today
      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var endDay = new Date(today);
      // Go to next Saturday (end of week row)
      endDay.setDate(endDay.getDate() + (6 - endDay.getDay()));
      var startDay = new Date(endDay);
      startDay.setDate(startDay.getDate() - (WEEKS * 7 - 1));

      // Month labels
      var monthLabels = [];
      var prevMonth = -1;
      var cursor = new Date(startDay);
      for (var w = 0; w < WEEKS; w++) {
        var weekStart = new Date(startDay);
        weekStart.setDate(weekStart.getDate() + w * 7);
        var m = weekStart.getMonth();
        if (m !== prevMonth) {
          monthLabels.push({ week: w, label: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m] });
          prevMonth = m;
        }
      }

      function intensity(tokens) {
        if (tokens <= 0 || maxTokens <= 0) return 0;
        var ratio = tokens / maxTokens;
        if (ratio < 0.05) return 1;
        if (ratio < 0.25) return 2;
        if (ratio < 0.5) return 3;
        return 4;
      }

      var heatColors = ['var(--bg-2)', '#0e4429', '#006d32', '#26a641', '#39d353'];

      var svgW = leftPad + WEEKS * CELL + Math.max(WEEKS - 1, 0) * GAP;
      var svgH = 7 * step + 20;
      var h = '<div style="width:100%;overflow-x:hidden">';
      h += '<svg width="100%" viewBox="0 0 ' + svgW + ' ' + svgH + '" preserveAspectRatio="xMinYMin meet" style="display:block;width:100%;height:auto">';

      // Month labels
      for (var mi = 0; mi < monthLabels.length; mi++) {
        var ml = monthLabels[mi];
        h += '<text x="' + (leftPad + ml.week * step) + '" y="10" fill="var(--fg-3)" font-size="10">' + ml.label + '</text>';
      }

      // Day labels
      var dayLabels = ['','M','','W','','F',''];
      for (var dl = 0; dl < 7; dl++) {
        if (dayLabels[dl]) {
          h += '<text x="16" y="' + (20 + dl * step + CELL - 2) + '" fill="var(--fg-3)" font-size="9" text-anchor="end">' + dayLabels[dl] + '</text>';
        }
      }

      // Cells
      for (var w = 0; w < WEEKS; w++) {
        for (var dow = 0; dow < 7; dow++) {
          var cellDate = new Date(startDay);
          cellDate.setDate(cellDate.getDate() + w * 7 + dow);
          if (cellDate > today) continue;
          var key = cellDate.getFullYear() + '-' + String(cellDate.getMonth() + 1).padStart(2, '0') + '-' + String(cellDate.getDate()).padStart(2, '0');
          var entry = tokensByDate[key];
          var tokens = entry ? entry.totalContextTokens : 0;
          var reqs = entry ? entry.requests : 0;
          var e429 = entry ? entry.error429Count : 0;
          var e503 = entry ? entry.error503Count : 0;
          var lvl = intensity(tokens);
          var cx = leftPad + w * step;
          var cy = 16 + dow * step;
          var tip = key + ': ' + formatCompactNumber(tokens) + ' tokens, ' + reqs + ' reqs';
          if (e429 > 0 || e503 > 0) tip += ', 429:' + e429 + ' 503:' + e503;
          h += '<rect x="' + cx + '" y="' + cy + '" width="' + CELL + '" height="' + CELL + '" rx="2" fill="' + heatColors[lvl] + '" style="outline:1px solid rgba(255,255,255,.04)">';
          h += '<title>' + esc(tip) + '</title></rect>';
        }
      }

      h += '</svg></div>';

      // Legend
      h += '<div style="display:flex;align-items:center;gap:4px;font-size:var(--text-xs);color:var(--fg-3);margin-top:var(--sp-1)">';
      h += '<span>Less</span>';
      for (var li = 0; li < heatColors.length; li++) {
        h += '<span style="display:inline-block;width:' + CELL + 'px;height:' + CELL + 'px;border-radius:2px;background:' + heatColors[li] + ';outline:1px solid rgba(255,255,255,.04)"></span>';
      }
      h += '<span>More</span>';
      h += '<span style="margin-left:auto">' + esc(formatCompactNumber(maxTokens)) + ' peak</span>';
      h += '</div>';

      container.innerHTML = h;
    }

      var refreshBtn = document.getElementById('accounts-refresh-btn');
      if (refreshBtn) { refreshBtn.disabled = false; refreshBtn.textContent = 'Refresh'; }
      var summaryEl = document.getElementById('pool-summary');
      if (!data || !data.backends) {
        summaryEl.innerHTML = '<span style="color:var(--fg-2);font-size:var(--text-sm)">Bridge not running — click Refresh Status when online</span>';
        // Clear pool entry overlays from account rows
        document.querySelectorAll('.pool-entries').forEach(function(el) { el.innerHTML = ''; });
        return;
      }

      // Summary cards
      var totalReady = 0, totalCooling = 0, totalModelCooldown = 0, totalDisabled = 0, totalEntries = 0;
      for (var bk in data.backends) {
        var counts = getBackendStateCounts(bk, data.backends[bk]);
        totalReady += counts.ready;
        totalCooling += counts.cooling;
        totalModelCooldown += counts.modelCooldown;
        totalDisabled += counts.disabled + counts.unavailable;
        totalEntries += counts.total;
      }

      summaryEl.innerHTML =
        '<div class="status-grid" style="grid-template-columns:repeat(5,1fr)">' +
          '<div class="status-card"><span class="status-dot dot dot-good"></span><div class="status-card-body"><div class="status-card-label">Ready</div><div class="status-card-value">' + totalReady + '</div></div></div>' +
          '<div class="status-card"><span class="status-dot dot dot-warn"></span><div class="status-card-body"><div class="status-card-label">Cooldown</div><div class="status-card-value">' + totalCooling + '</div></div></div>' +
          '<div class="status-card"><span class="status-dot dot dot-warn"></span><div class="status-card-body"><div class="status-card-label">Model Cooldown</div><div class="status-card-value">' + totalModelCooldown + '</div></div></div>' +
          '<div class="status-card"><span class="status-dot dot dot-bad"></span><div class="status-card-body"><div class="status-card-label">Disabled</div><div class="status-card-value">' + totalDisabled + '</div></div></div>' +
          '<div class="status-card"><span class="status-dot dot"></span><div class="status-card-body"><div class="status-card-label">Total</div><div class="status-card-value">' + totalEntries + '</div></div></div>' +
        '</div>';

      renderCodexSummary(data);
      renderOverviewHealth();

      // Refresh sidebar dots and detail panel with new pool data
      if (allData) renderAccounts(allData);
    }

    function renderGoogleQuota(data) {
      if (data && data.accounts) {
        googleQuotaData = data;
        persistGoogleQuotaCache();
      }
      // Refresh detail panel with new quota data
      renderChannelDetail();
      renderOverviewHealth();
    }

    // ── Tests tab ──
    const TESTS = [
      { id: 'proxy',      name: 'Proxy Bypass',        desc: 'Check system proxy bypass entries for Cursor domains (does not validate TUN/global proxy interception)' },
      { id: 'ssl',        name: 'SSL Certificates',    desc: 'Validate local certificate files and SAN coverage for Cursor domains' },
      { id: 'bridge',     name: 'Bridge Health',       desc: 'HTTPS health check against the local bridge' },
      { id: 'h2',         name: 'End-to-End Cursor TLS', desc: 'Verify api2.cursor.sh resolves correctly and presents a valid certificate end-to-end' },
      { id: 'forwarding', name: 'Traffic Forwarding',  desc: 'Verify hosts mapping and the active platform forwarding backend' },
      { id: 'dns',        name: 'DNS Resolution',      desc: 'Resolve Cursor domains via /etc/hosts to the managed local IP' },
      { id: 'accounts',   name: 'Backend Accounts',    desc: 'Check at least one account is configured' },
    ];
    const testState = {};

    function initTests() {
      const root = document.getElementById('tests-root');
      root.innerHTML = TESTS.map(function(t) {
        testState[t.id] = { status: 'idle', output: '' };
        return '<div class="test-item" id="test-' + t.id + '">' +
          '<div class="test-header">' +
            '<div class="test-icon test-icon-idle" id="test-icon-' + t.id + '">·</div>' +
            '<div class="test-body">' +
              '<div class="test-name">' + esc(t.name) + '</div>' +
              '<div class="test-desc">' + esc(t.desc) + '</div>' +
            '</div>' +
            '<div class="test-run">' +
              '<button class="btn btn-secondary" id="test-btn-' + t.id + '" onclick="runTest(\'' + t.id + '\')">Run</button>' +
            '</div>' +
          '</div>' +
          '<div class="test-output" id="test-out-' + t.id + '"></div>' +
        '</div>';
      }).join('');
    }

    function setTestStatus(id, status, icon) {
      var iconEl = document.getElementById('test-icon-' + id);
      if (!iconEl) return;
      iconEl.className = 'test-icon test-icon-' + status;
      iconEl.textContent = icon;
    }

    function appendTestOutput(id, text) {
      var el = document.getElementById('test-out-' + id);
      if (!el) return;
      el.textContent += text + '\n';
      el.scrollTop = el.scrollHeight;
    }

    function runTest(id) {
      var el = document.getElementById('test-out-' + id);
      if (el) el.textContent = '';
      setTestStatus(id, 'running', '⟳');
      var btn = document.getElementById('test-btn-' + id);
      if (btn) btn.disabled = true;
      vscode.postMessage({ type: 'runTest', testId: id });
    }

    function runAllTests() {
      TESTS.forEach(function(t) { runTest(t.id); });
    }

    function handleTestResult(data) {
      var id = data.testId;
      if (data.line) {
        appendTestOutput(id, data.line);
      }
      if (data.status) {
        var iconMap = { pass: '✓', fail: '✗', warn: '!' };
        setTestStatus(id, data.status, iconMap[data.status] || '·');
        var btn = document.getElementById('test-btn-' + id);
        if (btn) btn.disabled = false;
      }
    }

    initTests();

    vscode.postMessage({ type: 'getAll' });
  </script>
</body>
</html>
