<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
  <title>Agent Vibes Dashboard</title>
  <style>
    /* ── Design tokens (matching sidebar) ── */
    :root {
      --bg: var(--vscode-editor-background);
      --bg-2: var(--vscode-sideBar-background, #1e1e2e);
      --fg: var(--vscode-editor-foreground);
      --fg-2: var(--vscode-descriptionForeground, rgba(255,255,255,0.56));
      --fg-3: color-mix(in srgb, var(--fg) 32%, transparent);
      --border: var(--vscode-panel-border, rgba(255,255,255,0.1));
      --line: color-mix(in srgb, var(--fg) 8%, transparent);
      --focus: var(--vscode-focusBorder, #007acc);
      --input-bg: var(--vscode-input-background, rgba(255,255,255,0.06));
      --input-border: var(--vscode-input-border, rgba(255,255,255,0.12));
      --input-fg: var(--vscode-input-foreground, #ccc);

      --good: #34d399;
      --warn: #fbbf24;
      --bad: #f87171;
      --muted: #64748b;

      --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-5: 20px; --sp-6: 24px; --sp-8: 32px;
      --text-xs: 10px; --text-sm: 11px; --text-base: 12px; --text-lg: 13px;
      --text-xl: 16px; --text-2xl: 20px; --text-3xl: 28px;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--vscode-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif);
      font-size: var(--text-base);
      line-height: 1.5;
      background: var(--bg);
      color: var(--fg);
      overflow-x: hidden;
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    button:focus-visible { outline: 1px solid var(--focus); outline-offset: 1px; }

    /* ── Layout ── */
    .shell {
      width: min(1120px, calc(100vw - 32px));
      max-width: none;
      margin: 0 auto;
      padding: var(--sp-4) var(--sp-3) var(--sp-8);
    }

    /* ── Tab bar ── */
    .tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--line);
      margin-bottom: var(--sp-4);
      position: sticky; top: 0; z-index: 10;
      background: var(--bg);
    }
    .tab {
      padding: var(--sp-3) var(--sp-4);
      border: none; background: transparent;
      color: var(--fg-2); font-size: var(--text-lg); font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .tab:hover { color: var(--fg); }
    .tab.active { color: var(--fg); border-bottom-color: var(--focus); }

    .pane { display: none; }
    .pane.active { display: block; }

    /* ── Section ── */
    .section + .section { border-top: 1px solid var(--line); padding-top: var(--sp-4); margin-top: var(--sp-4); }
    .section-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: var(--sp-3);
    }
    .section-title {
      font-size: var(--text-xs); font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-2);
    }
    .section-aside { font-size: var(--text-sm); color: var(--fg-2); }

    /* ── Dot indicators ── */
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .dot-good { background: var(--good); }
    .dot-warn { background: var(--warn); }
    .dot-bad { background: var(--bad); }

    /* ── Progress bar ── */
    .progress-row {
      display: flex; align-items: center; gap: var(--sp-3); margin-bottom: var(--sp-4);
    }
    .progress-track {
      flex: 1; height: 4px; border-radius: 999px;
      background: color-mix(in srgb, var(--fg) 12%, transparent); overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: inherit;
      background: var(--good);
      transition: width 400ms ease;
    }
    .progress-label { font-size: var(--text-sm); color: var(--fg-2); white-space: nowrap; }

    /* ── Status grid (single row) ── */
    .status-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--sp-2);
    }
    @media (max-width: 640px) { .status-grid { grid-template-columns: repeat(2, 1fr); } }
    .status-card {
      display: flex; align-items: center; gap: var(--sp-3);
      padding: var(--sp-3); border-radius: var(--radius); background: var(--input-bg);
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .status-card-body { flex: 1; min-width: 0; }
    .status-card-label { font-size: var(--text-sm); color: var(--fg-2); }
    .status-card-value { font-size: var(--text-base); font-weight: 700; margin-top: 1px; }
    .status-card-action { flex-shrink: 0; }

    .overview-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
    }
    .meta-pill {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      font-size: var(--text-sm);
      color: var(--fg-2);
    }
    .meta-pill-label {
      color: var(--fg-3);
      font-weight: 600;
    }
    .meta-pill-value {
      color: var(--fg-2);
      font-weight: 500;
    }

    /* ── Setup checklist ── */
    .setup-list { margin-top: var(--sp-4); }
    .setup-item {
      display: flex; align-items: flex-start; gap: var(--sp-3);
      padding: var(--sp-2) 0;
    }
    .setup-item + .setup-item { border-top: 1px solid var(--line); }
    .setup-icon {
      width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
    }
    .setup-icon-done { background: var(--good); }
    .setup-icon-action { background: var(--warn); }
    .setup-icon-pending { background: var(--muted); }
    .setup-body { flex: 1; min-width: 0; }
    .setup-title { font-size: var(--text-base); font-weight: 600; }
    .setup-desc { font-size: var(--text-sm); color: var(--fg-2); margin-top: 1px; }
    .setup-action { flex-shrink: 0; align-self: center; }
    .health-banner {
      display: flex; align-items: center; gap: var(--sp-3);
      padding: var(--sp-3); border-radius: var(--radius); background: var(--input-bg);
      border-left: 3px solid var(--muted);
      margin-bottom: var(--sp-4);
    }
    .health-banner-good { border-left-color: var(--good); }
    .health-banner-warn { border-left-color: var(--warn); }
    .health-banner-bad { border-left-color: var(--bad); }
    .health-banner-body { min-width: 0; }
    .health-banner-title { font-size: var(--text-base); font-weight: 700; }
    .health-banner-desc { font-size: var(--text-sm); color: var(--fg-2); margin-top: 1px; }
    .c-good { color: var(--good); }
    .c-warn { color: var(--warn); }
    .c-bad { color: var(--bad); }

    /* ── Backend cards (sidebar style) ── */
    .backends { display: grid; gap: var(--sp-4); }
    .be {
      padding: var(--sp-3) var(--sp-4);
      border-radius: var(--radius);
      border-left: 3px solid var(--muted);
      background: var(--input-bg);
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
      min-height: 100px;
    }
    .be-ag { border-left-color: var(--good); }
    .be-cx { border-left-color: var(--warn); }
    .be-oai { border-left-color: #60a5fa; }
    .be-cl { border-left-color: #f87171; }
    .be-top { display: flex; align-items: baseline; justify-content: space-between; gap: var(--sp-3); }
    .be-top-left { display: flex; align-items: baseline; gap: var(--sp-3); }
    .be-name { font-size: var(--text-lg); font-weight: 700; position: relative; cursor: pointer; }
    .be-name:hover { text-decoration: underline; color: var(--focus); }
    .be-name:hover::after { content: ' \279C'; font-size: var(--text-sm); opacity: 0.5; }
    .be-count { font-size: var(--text-sm); font-weight: 700; color: var(--fg-2); min-width: 20px; text-align: right; }
    .be-status { font-size: var(--text-sm); color: var(--fg-2); }

    /* ── Buttons ── */
    .btn-row { display: flex; flex-wrap: wrap; align-items: center; gap: var(--sp-2); margin-top: var(--sp-3); }
    .btn {
      display: inline-flex; align-items: center; height: 28px;
      padding: 0 var(--sp-3); border-radius: var(--radius);
      border: 1px solid transparent;
      font-size: var(--text-sm); font-weight: 600;
      transition: opacity 120ms ease, background 120ms ease;
    }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { background: var(--focus); color: #fff; border-color: var(--focus); }
    .btn-secondary { background: var(--input-bg); color: var(--fg); border-color: var(--border); }
    .btn-ghost { background: transparent; color: var(--fg-2); border-color: transparent; }
    .btn-ghost:hover:not(:disabled) { background: var(--input-bg); color: var(--fg); }
    .btn-danger {
      background: color-mix(in srgb, var(--bad) 10%, transparent);
      color: var(--bad);
      border-color: color-mix(in srgb, var(--bad) 30%, transparent);
      font-size: var(--text-xs);
    }
    .btn-danger:hover:not(:disabled) {
      background: color-mix(in srgb, var(--bad) 18%, transparent);
      border-color: color-mix(in srgb, var(--bad) 45%, transparent);
      color: #fff;
    }
    .account-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: var(--sp-2);
      flex-shrink: 0;
    }
    .account-action-btn {
      height: 24px;
      min-width: 64px;
      justify-content: center;
      padding: 0 10px;
      font-size: var(--text-xs);
    }

    /* ── Logs path row ── */
    .log-path-bar {
      margin-bottom: var(--sp-3);
      padding-bottom: var(--sp-2);
    }
    .log-path-value {
      display: inline-block;
      max-width: 100%;
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: var(--text-sm);
      word-break: break-all;
      color: var(--fg-2);
      cursor: pointer;
      border-radius: var(--radius);
      padding: 2px 4px;
      transition: background 120ms ease, color 120ms ease;
    }
    .log-path-value:hover {
      color: var(--fg);
      background: var(--input-bg);
    }

    /* ── Accounts: channel sections ── */
    .ch-section { margin-bottom: var(--sp-6); }
    .ch-head {
      display: flex; align-items: center; gap: var(--sp-2); margin-bottom: var(--sp-3);
    }
    .ch-bar {
      width: 3px; height: 16px; border-radius: 2px; flex-shrink: 0;
    }
    .ch-bar-ag { background: var(--good); }
    .ch-bar-cx { background: var(--warn); }
    .ch-bar-oai { background: #60a5fa; }
    .ch-bar-cl { background: #f87171; }
    .ch-name { font-size: var(--text-lg); font-weight: 700; flex: 1; }
    .ch-count { font-size: var(--text-sm); font-weight: 600; color: var(--fg-2); }
    .ch-meta {
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: var(--text-xs); color: var(--fg-3);
      margin-bottom: var(--sp-2); word-break: break-all;
    }
    .ch-actions { display: flex; gap: var(--sp-1); }

    .acct {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--sp-2); padding: var(--sp-2) 0;
      border-bottom: 1px solid var(--line);
    }
    .acct:last-child { border-bottom: none; }
    .acct-info { flex: 1; min-width: 0; }
    .acct-name { font-size: var(--text-base); font-weight: 600; }
    .acct-detail {
      font-size: var(--text-sm); color: var(--fg-2);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .acct-empty { padding: var(--sp-3) 0; color: var(--fg-2); font-size: var(--text-sm); }

    /* ── Accounts sidebar layout ── */
    .acct-layout { display: flex; gap: 0; min-height: 500px; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
    .acct-sidebar { width: 160px; flex-shrink: 0; border-right: 1px solid var(--line); overflow-y: auto; background: var(--bg); }
    .acct-detail-panel { flex: 1; padding: var(--sp-5); overflow-y: auto; }
    .acct-group-title {
      padding: var(--sp-3) var(--sp-3) var(--sp-1);
      font-size: var(--text-xs); font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      color: var(--fg-3);
    }
    .acct-group-add {
      margin-left: auto; font-size: 14px; font-weight: 700; cursor: pointer; border: none;
      background: none; color: var(--fg-2); padding: 0 4px; line-height: 1;
    }
    .acct-group-add:hover { color: var(--fg-1); }
    .acct-item {
      display: flex; align-items: center; gap: var(--sp-2); padding: 8px var(--sp-3);
      cursor: pointer; border-bottom: 1px solid var(--line); transition: background .1s;
      font-size: var(--text-sm); color: var(--fg-1);
    }
    .acct-item:hover { background: rgba(255,255,255,.04); }
    .acct-item.selected { background: rgba(59,130,246,.12); border-left: 2px solid var(--focus); }
    .acct-item .dot { width: 6px; height: 6px; flex-shrink: 0; }
    .acct-item-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .detail-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--fg-3); font-size: var(--text-sm); }
    .detail-header { margin-bottom: var(--sp-4); }
    .detail-email { font-size: var(--text-lg); font-weight: 700; }
    .detail-meta { font-size: var(--text-xs); color: var(--fg-3); margin-top: 2px; }
    .detail-badges { display: flex; gap: var(--sp-2); margin-top: var(--sp-2); }
    .detail-section { margin-top: var(--sp-5); }
    .detail-section-title { font-size: var(--text-xs); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--fg-3); margin-bottom: var(--sp-2); }
    .quota-row { margin-bottom: var(--sp-3); }
    .quota-label { display: flex; justify-content: space-between; font-size: var(--text-sm); margin-bottom: 4px; }
    .quota-label span:first-child { font-weight: 600; color: var(--fg-1); }
    .quota-label span:last-child { color: var(--fg-2); }

    /* ── Key-value rows ── */
    .kv {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--sp-2); padding: var(--sp-2) 0;
      border-bottom: 1px solid var(--line);
    }
    .kv:last-child { border-bottom: none; }
    .kv-key { font-size: var(--text-base); font-weight: 600; }
    .kv-val { font-size: var(--text-sm); color: var(--fg-2); text-align: right; max-width: 56%; word-break: break-all; }
    .kv-hint { font-size: var(--text-xs); color: var(--fg-3); margin-top: 2px; }

    /* ── Toggle switch ── */
    .toggle {
      display: inline-flex; align-items: center; gap: var(--sp-2); cursor: pointer;
    }
    .toggle-track {
      width: 32px; height: 18px; border-radius: 9px;
      background: var(--input-bg); border: 1px solid var(--input-border);
      transition: background 160ms ease, border-color 160ms ease;
      position: relative;
    }
    .toggle-track::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--fg-2);
      transition: transform 160ms ease, background 160ms ease;
    }
    .toggle.on .toggle-track { background: var(--focus); border-color: var(--focus); }
    .toggle.on .toggle-track::after { transform: translateX(14px); background: #fff; }
    .toggle-label { font-size: var(--text-sm); color: var(--fg-2); user-select: none; }
    .toggle:hover .toggle-track { border-color: color-mix(in srgb, var(--focus) 60%, transparent); }
    .toggle.disabled { opacity: 0.45; cursor: default; }
    .toggle.disabled .toggle-label { cursor: default; }
    .toggle.disabled:hover .toggle-track { border-color: var(--input-border); }
    .toggle.pending { opacity: 0.72; cursor: progress; }
    .toggle.pending .toggle-label { cursor: progress; }
    .toggle.pending:hover .toggle-track { border-color: inherit; }
    .toggle.readonly { cursor: default; }
    .toggle.readonly .toggle-label { cursor: default; }
    .toggle.readonly:hover .toggle-track { border-color: var(--input-border); }

    /* ── Log viewer (borderless terminal style) ── */
    .log-box {
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: var(--text-sm); line-height: 1.6;
      max-height: 80vh; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
      color: var(--fg-2);
    }
    .log-line { margin: 0; }
    .log-line-info { color: var(--fg); }
    .log-line-warn { color: var(--warn); }
    .log-line-error { color: var(--bad); }
    .log-line-debug { color: var(--muted); }

    /* ── Tests tab ── */
    .test-list { display: grid; gap: var(--sp-2); }
    .test-item {
      border-radius: var(--radius); background: var(--input-bg);
      overflow: hidden;
    }
    .test-header {
      display: flex; align-items: center; gap: var(--sp-3);
      padding: var(--sp-3); cursor: default;
    }
    .test-icon {
      width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
    }
    .test-icon-idle { background: var(--muted); }
    .test-icon-running { background: var(--focus); animation: pulse 1s infinite; }
    .test-icon-pass { background: var(--good); }
    .test-icon-fail { background: var(--bad); }
    .test-icon-warn { background: var(--warn); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-loading { opacity: 0.7; pointer-events: none; cursor: not-allowed; }
    .btn-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    .test-body { flex: 1; min-width: 0; }
    .test-name { font-size: var(--text-base); font-weight: 600; }
    .test-desc { font-size: var(--text-sm); color: var(--fg-2); margin-top: 1px; }
    .test-run { flex-shrink: 0; }
    .test-output {
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: var(--text-xs); line-height: 1.6;
      /* Align output with the test title/description body, not the status icon */
      padding: 0 var(--sp-3) var(--sp-3) calc(var(--sp-3) + 20px + var(--sp-3));
      color: var(--fg-2);
      max-height: 200px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
    }
    .test-output:empty { display: none; }

    /* ── Settings two-panel ── */
    .settings-layout {
      display: flex; gap: 0; min-height: 400px;
    }
    .settings-nav {
      width: 180px; flex-shrink: 0;
      border-right: 1px solid var(--line);
      padding-right: var(--sp-3);
    }
    .settings-nav-item {
      display: block; width: 100%; text-align: left;
      padding: var(--sp-2) var(--sp-3); border: none; background: transparent;
      color: var(--fg-2); font-size: var(--text-base); font-weight: 600;
      border-radius: var(--radius); cursor: pointer;
      transition: background 120ms ease, color 120ms ease;
      margin-bottom: 2px;
    }
    .settings-nav-item:hover { background: var(--input-bg); color: var(--fg); }
    .settings-nav-item.active { background: var(--input-bg); color: var(--fg); border-left: 2px solid var(--focus); }
    .settings-content {
      flex: 1; min-width: 0; padding-left: var(--sp-6);
    }
    .settings-group { display: none; }
    .settings-group.active { display: block; }
    .settings-group-title {
      font-size: var(--text-lg); font-weight: 700; margin-bottom: var(--sp-4);
    }
    .settings-group-desc {
      font-size: var(--text-sm); color: var(--fg-2); margin-bottom: var(--sp-4);
    }
    .setting-item {
      padding: var(--sp-3) 0;
      border-bottom: 1px solid var(--line);
    }
    .setting-item:last-child { border-bottom: none; }
    .setting-top {
      display: flex; align-items: center; justify-content: space-between; gap: var(--sp-3);
    }
    .setting-label { font-size: var(--text-base); font-weight: 600; }
    .setting-desc { font-size: var(--text-sm); color: var(--fg-2); margin-top: 2px; }
    .setting-val {
      font-size: var(--text-sm); color: var(--fg-2); text-align: right;
      max-width: 60%; word-break: break-all;
      font-family: var(--vscode-editor-font-family, monospace);
    }
    .setting-input {
      width: 120px; padding: var(--sp-1) var(--sp-2); text-align: right;
      background: var(--input-bg); border: 1px solid var(--input-border);
      border-radius: var(--radius); color: var(--input-fg); font-size: var(--text-sm);
    }
    .setting-input:focus { outline: none; border-color: var(--focus); }
    .setting-control-cluster {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: var(--sp-2);
      flex-wrap: wrap;
    }
    .setting-select-wrap {
      position: relative;
      min-width: 180px;
    }
    .setting-select-wrap::after {
      content: '';
      position: absolute;
      top: 50%;
      right: 12px;
      width: 7px;
      height: 7px;
      border-right: 1.5px solid var(--fg-2);
      border-bottom: 1.5px solid var(--fg-2);
      transform: translateY(-65%) rotate(45deg);
      pointer-events: none;
      opacity: 0.9;
    }
    .setting-input-select {
      width: 100%;
      min-width: 180px;
      height: 34px;
      padding: 0 34px 0 12px;
      text-align: left;
      appearance: none;
      -webkit-appearance: none;
      background: color-mix(in srgb, var(--input-bg) 92%, var(--bg));
      border-color: color-mix(in srgb, var(--input-border) 88%, transparent);
      box-shadow: inset 0 1px 0 color-mix(in srgb, #fff 4%, transparent);
      transition: border-color 120ms ease, background 120ms ease, box-shadow 120ms ease;
    }
    .setting-input-select:hover {
      border-color: color-mix(in srgb, var(--focus) 36%, var(--input-border));
      background: color-mix(in srgb, var(--input-bg) 84%, var(--bg));
    }
    .setting-input-select:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--focus) 24%, transparent);
    }
    .setting-input-wide {
      width: 100%; margin-top: var(--sp-2); padding: var(--sp-2) var(--sp-3); text-align: left;
      background: var(--input-bg); border: 1px solid var(--input-border);
      border-radius: var(--radius); color: var(--input-fg); font-size: var(--text-sm);
      font-family: var(--vscode-editor-font-family, monospace);
    }
    .setting-input-wide:focus { outline: none; border-color: var(--focus); }
    .setting-badge {
      display: inline-block; padding: 1px 6px; border-radius: 999px;
      font-size: var(--text-xs); font-weight: 600;
    }
    .setting-badge-ok { background: color-mix(in srgb, var(--good) 16%, transparent); color: var(--good); }
    .setting-badge-warn { background: color-mix(in srgb, var(--warn) 16%, transparent); color: var(--warn); }
    .setting-badge-info { background: color-mix(in srgb, #60a5fa 16%, transparent); color: #60a5fa; }
    .setting-actions {
      display: flex; flex-wrap: wrap; justify-content: flex-end; gap: var(--sp-2);
    }
    .setting-hint {
      margin-top: var(--sp-2);
      font-size: var(--text-xs);
      color: var(--fg-3);
    }
    @media (max-width: 640px) {
      .settings-layout { flex-direction: column; }
      .settings-nav { width: 100%; border-right: none; border-bottom: 1px solid var(--line); padding: 0 0 var(--sp-2) 0; display: flex; gap: var(--sp-1); overflow-x: auto; }
      .settings-content { padding-left: 0; padding-top: var(--sp-4); }
    }

    /* ── Dialog overlay ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 100;
      justify-content: center; align-items: center;
    }
    .overlay.open { display: flex; }
    .dialog {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: var(--sp-6);
      width: 560px; max-width: 92%; max-height: 80vh; overflow-y: auto;
    }
    .oauth-tabs {
      display: flex; gap: 2px; border-radius: 8px; padding: 2px;
      background: var(--card); margin-bottom: var(--sp-4);
    }
    .oauth-tab {
      flex: 1; padding: 6px 16px; border-radius: 6px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: transparent; color: var(--fg-2); transition: all .15s;
    }
    .oauth-tab:hover { color: var(--fg-1); background: rgba(255,255,255,.05); }
    .oauth-tab.active { background: var(--bg); color: var(--fg-1); box-shadow: 0 1px 3px rgba(0,0,0,.2); }
    .dlg-body { min-height: 200px; }
    .dialog-title { font-size: var(--text-xl); font-weight: 700; margin-bottom: var(--sp-4); text-align: center; }
    .field { margin-bottom: var(--sp-3); }
    .field label { display: block; font-size: var(--text-sm); font-weight: 600; color: var(--fg-2); margin-bottom: var(--sp-1); }
    .field input, .field select, .field textarea {
      width: 100%; padding: var(--sp-2) var(--sp-3);
      background: var(--input-bg); border: 1px solid var(--input-border);
      border-radius: var(--radius); color: var(--input-fg); font-size: var(--text-lg);
    }
    .field textarea {
      min-height: 160px; resize: vertical;
      font-family: var(--vscode-editor-font-family, monospace); font-size: var(--text-sm);
    }
    .field input:focus, .field textarea:focus { outline: none; border-color: var(--focus); }
    .field-hint { font-size: var(--text-xs); color: var(--fg-3); margin-top: var(--sp-1); }
    .dialog-actions { display: flex; gap: var(--sp-2); justify-content: flex-end; margin-top: var(--sp-4); }

    /* ── Fade-in animation ── */
    .pane.active { animation: fade-up 260ms cubic-bezier(0.16, 1, 0.3, 1) both; }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 920px) {
      .shell {
        width: calc(100vw - 20px);
        padding-left: var(--sp-2);
        padding-right: var(--sp-2);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <nav class="tabs">
      <button class="tab active" data-tab="overview">Overview</button>
      <button class="tab" data-tab="accounts">Accounts</button>
      <button class="tab" data-tab="analytics">Analytics</button>
      <button class="tab" data-tab="settings">Settings</button>
      <button class="tab" data-tab="tests">Diagnostics</button>
      <button class="tab" data-tab="logs">Logs</button>
    </nav>

    <!-- ── Overview ── -->
    <div id="pane-overview" class="pane active">
      <!-- Branding -->
      <div style="display:flex;align-items:center;gap:var(--sp-4);margin-bottom:var(--sp-6)">
        <img id="overview-logo" src="" alt="Agent Vibes" style="width:48px;height:48px;border-radius:50%;flex-shrink:0" />
        <div>
          <div style="font-size:var(--text-2xl);font-weight:800;letter-spacing:-0.02em">Agent Vibes</div>
          <div style="font-size:var(--text-sm);color:var(--fg-2)">Unified AI Agent Gateway - Happy vibing!</div>
          <div class="overview-meta" id="overview-meta"></div>
        </div>
      </div>
      <!-- Status -->
      <div class="section">
        <div class="section-head">
          <span class="section-title">Status</span>
          <span class="section-aside" id="status-progress-text"></span>
        </div>
        <div class="progress-row" id="status-progress-bar" style="display:none">
          <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        </div>
        <div id="overview-health-banner"></div>
        <div class="status-grid" id="status-grid"></div>
        <div class="setup-list" id="setup-list"></div>
      </div>
      <!-- Actions -->
      <div class="section">
        <div class="section-head"><span class="section-title">Actions</span></div>
        <div class="btn-row" id="hero-actions"></div>
      </div>
      <!-- Backends: cards with actions -->
      <div class="section">
        <div class="section-head"><span class="section-title">Backends</span></div>
        <div class="backends" id="overview-backends"></div>
      </div>

    </div>

    <!-- ── Accounts ── -->
    <div id="pane-accounts" class="pane">
      <div class="section">
        <div class="section-head">
          <span class="section-title">Accounts</span>
          <div style="display:flex;gap:var(--sp-2);align-items:center">
            <button id="accounts-refresh-btn" class="btn btn-ghost" onclick="refreshPoolStatus(true, true)" title="Refresh Status">Refresh</button>
          </div>
        </div>
        <div id="pool-summary" style="margin-bottom:var(--sp-4)"></div>
      </div>
      <div class="acct-layout">
        <div class="acct-sidebar" id="acct-sidebar"></div>
        <div class="acct-detail-panel" id="acct-detail"><div class="detail-empty">Select an account to view details</div></div>
      </div>
    </div>

    <!-- ── Analytics ── -->
    <div id="pane-analytics" class="pane">
      <div class="section">
        <div class="section-head">
          <span class="section-title">Token Usage</span>
          <button class="btn btn-ghost" onclick="refreshUsageSummary(true)">Refresh</button>
        </div>
        <div id="analytics-banner" style="margin-bottom:var(--sp-3)"></div>
        <div id="analytics-heatmap" style="margin-bottom:var(--sp-4);width:100%"></div>
        <div id="analytics-summary"></div>
      </div>
      <div class="section">
        <div class="section-head"><span class="section-title">Session Runtime</span></div>
        <div id="analytics-session-summary" style="margin-bottom:var(--sp-3)"></div>
        <div id="analytics-sessions"></div>
      </div>
      <div class="section">
        <div class="section-head"><span class="section-title">By Backend</span></div>
        <div class="backends" id="analytics-backends"></div>
      </div>
      <div class="section">
        <div class="section-head"><span class="section-title">By Route</span></div>
        <div class="backends" id="analytics-routes"></div>
      </div>
      <div class="section">
        <div class="section-head"><span class="section-title">Top Models</span></div>
        <div id="analytics-models"></div>
      </div>
      <div class="section">
        <div class="section-head"><span class="section-title">Top Accounts</span></div>
        <div id="analytics-accounts"></div>
      </div>
      <div class="section">
        <div class="section-head"><span class="section-title">Recent Activity</span></div>
        <div id="analytics-recent"></div>
      </div>
    </div>

    <!-- ── Tests ── -->
    <div id="pane-tests" class="pane">
      <div class="section">
        <div class="section-head">
          <span class="section-title">Diagnostics</span>
          <button class="btn btn-primary" onclick="runAllTests()">Run All</button>
        </div>
        <div class="test-list" id="tests-root"></div>
      </div>
    </div>

    <!-- ── Logs ── -->
    <div id="pane-logs" class="pane">
      <div class="log-path-bar">
        <div class="log-path-value" id="log-file-path" onclick="copyLogPath()" title="Click to copy log file path" aria-label="Click to copy log file path">Loading...</div>
      </div>
      <div class="section">
        <div class="section-head">
          <span class="section-title">Bridge Log</span>
          <div style="display:flex;gap:var(--sp-2);align-items:center">
            <label class="toggle" id="log-debug-toggle" onclick="toggleDebugMode(this)" title="Enable verbose debug logging (requires bridge restart)">
              <span class="toggle-label">Debug</span>
              <div class="toggle-track"></div>
            </label>
            <label class="toggle" id="log-heartbeat-toggle" onclick="toggleHeartbeatFilter(this)" title="Show/hide heartbeat lines">
              <span class="toggle-label">Heartbeat</span>
              <div class="toggle-track"></div>
            </label>
            <div class="auto-refresh-group" style="display:flex;align-items:center;gap:var(--sp-1)">
              <label class="toggle" id="log-auto-refresh-toggle" onclick="toggleAutoRefresh(this)" title="Auto-refresh logs every 3 seconds">
                <span class="toggle-label">Auto</span>
                <div class="toggle-track"></div>
              </label>
            </div>
            <button class="btn btn-ghost" onclick="refreshLogs()">Refresh</button>
          </div>
        </div>
        <div class="log-box" id="log-box"><span style="color:var(--fg-2)">Click Refresh to load logs...</span></div>
      </div>
    </div>

    <!-- ── Settings ── -->
    <div id="pane-settings" class="pane">
      <div class="settings-layout">
        <nav class="settings-nav" id="settings-nav"></nav>
        <div class="settings-content" id="settings-content"></div>
      </div>
    </div>
  </main>

  <!-- Add Account Dialog -->
  <div class="overlay" id="dlg">
    <div class="dialog">
      <div class="dialog-title" id="dlg-title">Add Account</div>
      <div id="dlg-fields"></div>
      <div class="dialog-actions">
        <button class="btn btn-ghost" onclick="closeDlg()">Cancel</button>
        <button class="btn btn-primary" id="dlg-ok" onclick="submitDlg()">Add</button>
      </div>
    </div>
  </div>

  <script>
    const vscode = acquireVsCodeApi();
    let curCh = null;
    let dlgMode = 'add';
    let dlgEditIndex = -1;
    let dlgInitialData = null;
    let allData = {};
    let usageSummaryData = null;
    let dailyUsageData = null;
    let analyticsHydrated = false;
    let currentLogFilePath = '';
    let currentLogFileExists = false;

    const CH = {
      antigravity: {
        label: 'Antigravity IDE', barCls: 'ch-bar-ag', beCls: 'be-ag', color: '#34d399',
        mode: 'sync',
        sync: [
          { label: 'Sync Antigravity IDE', cmd: 'agentVibes.syncAntigravityIDE' },
          { label: 'Sync Antigravity Tool', cmd: 'agentVibes.syncAntigravityTools' },
        ],
        fields: [],
        name: a => a.email || 'Synced account',
        info: a => { const t = a.accessToken || a.token?.access_token || ''; return t ? t.slice(0, 24) + '...' : 'No token'; },
      },
      codex: {
        label: 'Codex CLI', barCls: 'ch-bar-cx', beCls: 'be-cx', color: '#fbbf24',
        mode: 'codex-oauth',
        sync: [
          { label: 'Sync Codex CLI', cmd: 'agentVibes.syncCodex' },
          { label: 'Sync CPA', cmd: 'agentVibes.importCodexCpaJsons' }
        ],
        fields: [],
        name: a => {
          var base = a.email || a.accountId || 'Unknown';
          if (a.accountId) base += ' (' + a.accountId.slice(0, 8) + ')';
          return base;
        },
        info: a => (a.planType || 'unknown') + ' | ' + ((a.accessToken || '').slice(0, 20) || '--') + '...',
      },
      'openai-compat': {
        label: 'OpenAI-Compatible', barCls: 'ch-bar-oai', beCls: 'be-oai', color: '#60a5fa',
        mode: 'form',
        fields: [
          { key: 'label', label: 'Label', type: 'text', ph: 'e.g. claude-proxy' },
          { key: 'baseUrl', label: 'Base URL', type: 'text', ph: 'https://api.example.com' },
          { key: 'apiKey', label: 'API Key', type: 'text' },
          { key: 'maxContextTokens', label: 'Max Context Tokens', type: 'number', ph: '200000', defaultValue: '200000' },
          { key: 'proxyUrl', label: 'Proxy URL (optional)', type: 'text', ph: 'http://127.0.0.1:7897' },
        ],
        name: a => a.label || a.baseUrl || 'Unknown',
        info: a => a.baseUrl || '',
      },
      'claude-api': {
        label: 'Claude Code CLI', barCls: 'ch-bar-cl', beCls: 'be-cl', color: '#f87171',
        mode: 'form',
        sync: [{ label: 'Sync Claude', cmd: 'agentVibes.syncClaude' }],
        fields: [
          { key: 'label', label: 'Label', type: 'text' },
          { key: 'baseUrl', label: 'Base URL', type: 'text', ph: 'https://api.anthropic.com' },
          { key: 'apiKey', label: 'API Key', type: 'text', ph: 'sk-ant-...' },
          { key: 'maxContextTokens', label: 'Max Context Tokens', type: 'number', ph: '200000', defaultValue: '200000' },
          { key: 'proxyUrl', label: 'Proxy URL (optional)', type: 'text', ph: 'http://127.0.0.1:7897' },
        ],
        name: a => a.label || 'Unnamed',
        info: a => a.apiKey ? a.apiKey.slice(0, 16) + '...' : '',
      },
    };

    function getChannelState(data, key) {
      const raw = data[key];
      if (Array.isArray(raw)) return { accounts: raw, filePath: '', exists: false, source: 'default' };
      return {
        accounts: Array.isArray(raw?.accounts) ? raw.accounts : [],
        filePath: typeof raw?.filePath === 'string' ? raw.filePath : '',
        exists: Boolean(raw?.exists),
        source: raw?.source === 'custom' ? 'custom' : 'default',
      };
    }

    function hasUsageSummaryCache() {
      return usageSummaryData != null;
    }

    function hasDailyUsageCache() {
      return dailyUsageData != null;
    }

    function hasAnalyticsCache() {
      return hasUsageSummaryCache() && hasDailyUsageCache();
    }

    function isAnalyticsPaneActive() {
      var analyticsPane = document.getElementById('pane-analytics');
      return !!(analyticsPane && analyticsPane.classList.contains('active'));
    }

    function restoreAnalyticsCache() {
      try {
        var state = vscode.getState() || {};
        if (state.usageSummaryData) {
          usageSummaryData = state.usageSummaryData;
          renderUsageSummary(state.usageSummaryData);
        }
        if (state.dailyUsageData) {
          dailyUsageData = state.dailyUsageData;
          renderTokenHeatmap(state.dailyUsageData);
        }
        analyticsHydrated = hasAnalyticsCache();
      } catch (err) {
        analyticsHydrated = false;
      }
    }

    function restoreCodexQuotaCache() {
      try {
        var state = vscode.getState() || {};
        if (state.codexQuotaData && state.codexQuotaData.accounts) {
          codexQuotaData = state.codexQuotaData;
          codexQuotaStatus.hasData = true;
          codexQuotaStatus.lastUpdatedAt = state.codexQuotaUpdatedAt || getCodexQuotaTimestamp(state.codexQuotaData) || null;
        }
        if (typeof state.codexQuotaFetchedAt === 'number') codexQuotaFetchedAt = state.codexQuotaFetchedAt;
      } catch (err) {
        codexQuotaData = null;
      }
    }

    function restoreGoogleQuotaCache() {
      try {
        var state = vscode.getState() || {};
        if (state.googleQuotaData && state.googleQuotaData.accounts) {
          googleQuotaData = state.googleQuotaData;
        }
        if (typeof state.googleQuotaFetchedAt === 'number') googleQuotaFetchedAt = state.googleQuotaFetchedAt;
        if (typeof state.poolStatusFetchedAt === 'number') poolStatusFetchedAt = state.poolStatusFetchedAt;
      } catch (err) {
        googleQuotaData = null;
      }
    }

    function persistAnalyticsCache() {
      try {
        var prev = vscode.getState() || {};
        vscode.setState(Object.assign({}, prev, {
          usageSummaryData: usageSummaryData,
          dailyUsageData: dailyUsageData,
        }));
      } catch (err) {
        // ignore cache persistence failures
      }
    }

    function persistCodexQuotaCache() {
      try {
        var prev = vscode.getState() || {};
        vscode.setState(Object.assign({}, prev, {
          codexQuotaData: codexQuotaData,
          codexQuotaUpdatedAt: codexQuotaStatus.lastUpdatedAt,
          codexQuotaFetchedAt: codexQuotaFetchedAt,
        }));
      } catch (err) {
        // ignore cache persistence failures
      }
    }

    function persistGoogleQuotaCache() {
      try {
        var prev = vscode.getState() || {};
        vscode.setState(Object.assign({}, prev, {
          googleQuotaData: googleQuotaData,
          googleQuotaFetchedAt: googleQuotaFetchedAt,
          poolStatusFetchedAt: poolStatusFetchedAt,
        }));
      } catch (err) {
        // ignore cache persistence failures
      }
    }

    // ── 数据新鲜度检查常量和状态 ──
    var POOL_STALE_MS = 30000;        // Pool Status: 30 秒
    var CODEX_QUOTA_STALE_MS = 60000; // Codex Quota: 60 秒
    var GOOGLE_QUOTA_STALE_MS = 60000; // Google Quota: 60 秒

    var poolStatusFetchedAt = 0;
    var codexQuotaFetchedAt = 0;
    var googleQuotaFetchedAt = 0;

    function isStale(fetchedAt, thresholdMs) {
      return !fetchedAt || (Date.now() - fetchedAt) > thresholdMs;
    }

    restoreAnalyticsCache();
    restoreCodexQuotaCache();
    restoreGoogleQuotaCache();

    // ── Tabs ──
    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
        t.classList.add('active');
        const pane = document.getElementById('pane-' + t.dataset.tab);
        pane.classList.add('active');
        if (t.dataset.tab === 'logs') refreshLogs();
        if (t.dataset.tab === 'accounts') { refreshPoolStatus(false, false); }
        if (t.dataset.tab === 'analytics') {
          if (!hasAnalyticsCache()) restoreAnalyticsCache();
          refreshUsageSummary();
        }
      });
    });

    // ── Messages ──
    window.addEventListener('message', e => {
      const m = e.data;
      if (m.type === 'statusUpdate') {
        lastStatusData = m.data;
        reconcilePendingCommand(m.data);
        renderStatus(m.data);
        if (isAnalyticsPaneActive()) {
          refreshUsageSummary();
        }
      }
      if (m.type === 'accountsUpdate') { allData = m.data; renderAccounts(m.data); renderBackendSummary(m.data); }
      if (m.type === 'settingsUpdate') renderSettings(m.data);
      if (m.type === 'logsUpdate') {
        currentLogFilePath = m.logFilePath || '';
        currentLogFileExists = !!m.logFileExists;
        renderLogFilePath(currentLogFilePath, currentLogFileExists);
        renderLogs(m.data);
        var dbgToggle = document.getElementById('log-debug-toggle');
        if (dbgToggle) dbgToggle.classList.toggle('on', !!m.debugMode);
      }
      if (m.type === 'poolStatusUpdate') {
        if (m.data) poolStatusFetchedAt = Date.now();
        renderPoolStatus(m.data);
      }
      if (m.type === 'googleQuotaUpdate') {
        if (m.data && m.data.accounts) googleQuotaFetchedAt = Date.now();
        renderGoogleQuota(m.data);
      }
      if (m.type === 'codexQuotaUpdate') {
        if (m.data && m.data.accounts) codexQuotaFetchedAt = Date.now();
        renderCodexQuota(m.data);
      }
      if (m.type === 'usageSummaryUpdate') {
        usageSummaryData = m.data;
        analyticsHydrated = hasAnalyticsCache();
        renderUsageSummary(m.data);
        persistAnalyticsCache();
      }
      if (m.type === 'dailyUsageUpdate') {
        dailyUsageData = m.data;
        analyticsHydrated = hasAnalyticsCache();
        renderTokenHeatmap(m.data);
        persistAnalyticsCache();
      }
      if (m.type === 'testResult') handleTestResult(m.data);
      if (m.type === 'oauthStatus') handleOAuthStatus(m.data);
      if (m.type === 'codexOAuthStatus') handleCodexOAuthStatus(m.data);
    });

    window.addEventListener('resize', function() {
      var analyticsPane = document.getElementById('pane-analytics');
      if (!analyticsPane || !analyticsPane.classList.contains('active')) return;
      if (dailyUsageData && dailyUsageData.days && dailyUsageData.days.length) {
        renderTokenHeatmap(dailyUsageData);
      }
    });

    // Fetch initial pool status once on load
    setTimeout(function() {
      refreshPoolStatus(false, false);
    }, 0);

    var lastStatusData = null;
    var ACTION_META = {
      'agentVibes.startServer': { label: 'Start', tone: 'primary' },
      'agentVibes.stopServer': { label: 'Stop', tone: 'primary' },
      'agentVibes.restartServer': { label: 'Restart', tone: 'secondary' },
      'agentVibes.enableForwarding': { label: 'Enable forwarding', tone: 'primary' },
      'agentVibes.disableForwarding': { label: 'Disable forwarding', tone: 'secondary' },
    };
    var ACTION_TIMEOUTS = {
      'agentVibes.startServer': 60000,
      'agentVibes.stopServer': 45000,
      'agentVibes.restartServer': 60000,
      'agentVibes.enableForwarding': 45000,
      'agentVibes.disableForwarding': 45000,
    };

    function esc(v) {
      return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatNumber(value) {
      var num = Number(value || 0);
      if (!isFinite(num)) return '--';
      return num.toLocaleString();
    }

    function formatCompactNumber(value) {
      var num = Number(value || 0);
      if (!isFinite(num)) return '--';
      var abs = Math.abs(num);
      if (abs < 1000) return Math.round(num).toLocaleString();

      var units = [
        { value: 1e9, suffix: 'B' },
        { value: 1e6, suffix: 'M' },
        { value: 1e3, suffix: 'K' }
      ];

      for (var i = 0; i < units.length; i++) {
        var unit = units[i];
        if (abs >= unit.value) {
          var scaled = num / unit.value;
          var digits = Math.abs(scaled) >= 100 ? 0 : Math.abs(scaled) >= 10 ? 1 : 1;
          var text = scaled.toFixed(digits).replace(/\.0$/, '');
          return text + unit.suffix;
        }
      }

      return Math.round(num).toLocaleString();
    }

    function formatPercent(value) {
      if (typeof value !== 'number' || !isFinite(value)) return '--';
      return (Math.round(value * 10) / 10).toLocaleString() + '%';
    }

    function formatDateTime(value) {
      if (!value) return '--';
      var date = new Date(value);
      if (isNaN(date.getTime())) return String(value);
      return date.toLocaleString();
    }

    function formatConversationId(value) {
      var text = String(value || '');
      if (!text) return '--';
      return text.length > 18 ? text.slice(0, 8) + '…' + text.slice(-6) : text;
    }

    function clearPendingCommand(refresh) {
      if (window.__cmdPollTimer) {
        clearInterval(window.__cmdPollTimer);
        window.__cmdPollTimer = null;
      }
      window.__pendingCommand = null;
      if (refresh) {
        vscode.postMessage({ type: 'getAll' });
      }
    }

    function startPendingPoll() {
      if (window.__cmdPollTimer) return;
      window.__cmdPollTimer = setInterval(function() {
        if (!window.__pendingCommand) {
          clearPendingCommand(false);
          return;
        }
        vscode.postMessage({ type: 'getAll' });
      }, 1000);
    }

    function beginPendingCommand(command) {
      clearPendingCommand(false);
      window.__pendingCommand = {
        command: command,
        startedAt: Date.now(),
        initialBridge: lastStatusData ? lastStatusData.bridge : null,
        initialForwarding: Boolean(lastStatusData && lastStatusData.forwarding),
        sawBridgeLeaveRunning: lastStatusData ? lastStatusData.bridge !== 'Running' : false,
      };
      startPendingPoll();
      vscode.postMessage({ type: 'getAll' });
    }

    function getPendingCommand() {
      return window.__pendingCommand || null;
    }

    function getPendingTimeout(command) {
      return ACTION_TIMEOUTS[command] || 45000;
    }

    function getPendingDisplayCommand(status) {
      var pending = getPendingCommand();
      if (!pending || !status) return null;

      switch (pending.command) {
        case 'agentVibes.stopServer':
          if (status.bridge === 'Running' || status.bridge === 'starting') {
            return 'agentVibes.stopServer';
          }
          if (pending.initialForwarding && status.forwarding) {
            return 'agentVibes.disableForwarding';
          }
          return 'agentVibes.stopServer';
        case 'agentVibes.startServer':
          if (status.bridge !== 'Running') {
            return 'agentVibes.startServer';
          }
          if (!status.forwarding) {
            return 'agentVibes.enableForwarding';
          }
          return 'agentVibes.startServer';
        case 'agentVibes.restartServer':
          return 'agentVibes.restartServer';
        case 'agentVibes.enableForwarding':
        case 'agentVibes.disableForwarding':
          return pending.command;
        default:
          return pending.command;
      }
    }

    function reconcilePendingCommand(status) {
      var pending = getPendingCommand();
      if (!pending || !status) return;

      if (pending.command === 'agentVibes.restartServer' && status.bridge !== 'Running') {
        pending.sawBridgeLeaveRunning = true;
      }

      var done = false;
      switch (pending.command) {
        case 'agentVibes.stopServer':
          done =
            status.bridge !== 'Running' &&
            status.bridge !== 'starting' &&
            (!pending.initialForwarding || !status.forwarding);
          break;
        case 'agentVibes.startServer':
          done = status.bridge === 'error' || (status.bridge === 'Running' && status.forwarding);
          break;
        case 'agentVibes.restartServer':
          done =
            status.bridge === 'error' ||
            (pending.sawBridgeLeaveRunning && status.bridge === 'Running');
          break;
        case 'agentVibes.enableForwarding':
          done = !!status.forwarding;
          break;
        case 'agentVibes.disableForwarding':
          done = !status.forwarding;
          break;
      }

      if (done) {
        clearPendingCommand(false);
        return;
      }

      if (Date.now() - pending.startedAt >= getPendingTimeout(pending.command)) {
        clearPendingCommand(true);
      }
    }

    function getActionState(command, pendingDisplayCommand, baseDisabled) {
      if (!pendingDisplayCommand) {
        return { loading: false, disabled: !!baseDisabled };
      }
      return {
        loading: pendingDisplayCommand === command,
        disabled: pendingDisplayCommand !== command || !!baseDisabled,
      };
    }

    function actionBtn(label, command, tone = 'secondary', state = {}) {
      if (!command) return '';
      var loading = !!state.loading;
      var disabled = !!state.disabled || loading;
      var content = loading
        ? '<span class="btn-spinner"></span>' + esc(label) + '…'
        : esc(label);
      var classes = 'btn btn-' + tone + (loading ? ' btn-loading' : '');
      var attrs = disabled ? ' disabled' : '';
      return '<button class="' + classes + '" onclick="runCmdWithLoading(this, \'' + esc(command) + '\')"'+ attrs + '>' + content + '</button>';
    }

    function renderActions(s) {
      const actions = document.getElementById('hero-actions');
      const btns = [];
      const pendingDisplayCommand = getPendingDisplayCommand(s);
      const renderedCommands = new Set();
      const baseActions = [];
      const routingActive = Boolean(s.routingActive);

      const isRunning = s.bridge === 'Running';
      if (isRunning) {
        baseActions.push({ label: 'Stop', command: 'agentVibes.stopServer', tone: 'primary' });
      } else {
        baseActions.push({ label: 'Start', command: 'agentVibes.startServer', tone: 'primary' });
      }
      baseActions.push({ label: 'Restart', command: 'agentVibes.restartServer', tone: 'secondary', disabled: !isRunning });

      if (routingActive) {
        baseActions.push({ label: 'Disable forwarding', command: 'agentVibes.disableForwarding', tone: 'secondary' });
      } else {
        baseActions.push({ label: 'Enable forwarding', command: 'agentVibes.enableForwarding', tone: isRunning ? 'primary' : 'secondary' });
      }

      if (pendingDisplayCommand && !baseActions.some(function(action) { return action.command === pendingDisplayCommand; })) {
        var pendingMeta = ACTION_META[pendingDisplayCommand];
        if (pendingMeta) {
          btns.push(actionBtn(
            pendingMeta.label,
            pendingDisplayCommand,
            pendingMeta.tone,
            getActionState(pendingDisplayCommand, pendingDisplayCommand),
          ));
          renderedCommands.add(pendingDisplayCommand);
        }
      }

      for (const action of baseActions) {
        if (renderedCommands.has(action.command)) continue;
        btns.push(actionBtn(
          action.label,
          action.command,
          action.tone,
          getActionState(action.command, pendingDisplayCommand, action.disabled),
        ));
      }

      actions.innerHTML = btns.join('');
    }

    function switchTab(tabName) {

    // ── Overview: status ──
    function renderStatus(s) {

      }
      meta.innerHTML = metaCards.map(function(item) {

      }).join('') +

      const isRunning = s.bridge === 'Running';
      const setup = s.setup || null;

      // Progress bar — always visible
      const completed = setup?.completedSteps ?? 0;

      progressText.textContent = completed + ' / ' + total;

      const cards = [
        { label: 'Health', value: isRunning ? 'Online' : 'Offline', tone: isRunning ? 'good' : 'warn' },
        { label: 'SSL', value: s.hasCertificates ? 'Valid' : 'Missing', tone: s.hasCertificates ? 'good' : 'warn' },
        { label: trafficLabel, value: trafficValue, tone: trafficTone },
        { label: 'Port', value: String(s.port || '--'), tone: s.port ? 'good' : '' },
        { label: 'Accounts', value: String(s.totalAccounts || 0), tone: s.totalAccounts > 0 ? 'good' : 'warn' },
      ];
      grid.innerHTML = cards.map(function(c) {
        var dotCls = c.tone === 'good' ? 'dot-good' : c.tone === 'warn' ? 'dot-warn' : '';
        return '<div class="status-card">' +
          '<span class="status-dot dot ' + dotCls + '"></span>' +
          '<div class="status-card-body">' +
            '<div class="status-card-label">' + esc(c.label) + '</div>' +
            '<div class="status-card-value">' + esc(c.value) + '</div>' +
          '</div>' +
        '</div>';
      }).join('');

      // Setup checklist removed — Actions section provides sufficient guidance
      const setupList = document.getElementById('setup-list');
      setupList.innerHTML = '';
    }

    function normalizeVersionLabel(value) {
      if (!value) return '--';
      const text = String(value).trim();
      if (!text) return '--';
      return text.charAt(0).toLowerCase() === 'v' ? text : 'v' + text;

    // ── Overview: backends ──

    // ── Accounts tab ──
    var selectedChannel = 'antigravity';

    var antigravityDraft = { proxyUrl: '' };

    function getDefaultSelectedChannel() {

      for (var gi = 0; gi < groups.length; gi++) {

    function maskEmail(email) {
      if (!emailPrivacy || !email) return email;
      var at = email.indexOf('@');
      if (at <= 1) return '******@' + (at >= 0 ? email.slice(at + 1) : '******');
      return email.charAt(0) + '******' + email.slice(at);

    function renderAccounts(data) {

    function selectChannel(channel) {
      selectedChannel = CH[channel] ? channel : getDefaultSelectedChannel();
      codexSubView = 'accounts';
      acctPage = 0;
      renderAccounts(allData || {});
      if (selectedChannel === 'codex' && codexQuotaData && codexQuotaData.accounts && codexQuotaData.accounts.length) {
        if (isStale(codexQuotaFetchedAt, CODEX_QUOTA_STALE_MS)) {
          setTimeout(function() {

          }, 0);
        }
      }
    }

    function getPoolEntry(channel, index) {
      if (!poolData || !poolData.backends) return null;
      var poolKey = null;
      for (var pk in POOL_BACKEND_MAP) {
        if (POOL_BACKEND_MAP[pk] === channel) { poolKey = pk; break; }
      }
      if (!poolKey) return null;
      var backend = poolData.backends[poolKey];
      if (!backend || !backend.entries) return null;

      // Match by email+accountId (preferred), then email/label, then index
      if (allData) {
        var d = CH[channel];
        var state = getChannelState(allData, channel);
        if (d && state.accounts[index]) {
          var acct = state.accounts[index];
          var acctName = d.name(acct);
          var acctId = acct.accountId || '';

          // Try exact match: email + accountId
          if (acctName && acctId) {
            for (var pi = 0; pi < backend.entries.length; pi++) {
              if (backend.entries[pi].label === acctName && backend.entries[pi].accountId === acctId) {
                return backend.entries[pi];
              }
            }
          }

          // Fallback: match by email/label only
          if (acctName) {
            for (var pi = 0; pi < backend.entries.length; pi++) {
              if (backend.entries[pi].label === acctName) return backend.entries[pi];
            }
          }
        }
      }

      // Fallback: index-based
      return backend.entries[index] || null;
    }

    function getQuotaAccount(email) {
      if (!googleQuotaData || !googleQuotaData.accounts) return null;
      var normalizedEmail = email ? String(email).trim().toLowerCase() : '';
      for (var i = 0; i < googleQuotaData.accounts.length; i++) {
        var item = googleQuotaData.accounts[i];
        var itemEmail = item && item.email ? String(item.email).trim().toLowerCase() : '';
        if (normalizedEmail && itemEmail === normalizedEmail) return item;
      }
      return null;
    }

    function getCodexQuotaAccount(acct, poolEntry) {
      if (!codexQuotaData || !codexQuotaData.accounts) return (poolEntry && poolEntry.rateLimits) ? poolEntry : null;
      var acctEmail = acct && acct.email ? String(acct.email).toLowerCase() : '';
      var acctId = acct && acct.accountId ? String(acct.accountId) : '';
      var acctWorkspaceId = acct && acct.workspaceId ? String(acct.workspaceId) : '';
      var poolLabel = poolEntry && poolEntry.label ? String(poolEntry.label) : '';
      for (var i = 0; i < codexQuotaData.accounts.length; i++) {
        var item = codexQuotaData.accounts[i];
        var itemEmail = item && item.email ? String(item.email).toLowerCase() : '';
        var itemId = item && item.accountId ? String(item.accountId) : '';
        var itemWorkspaceId = item && item.workspaceId ? String(item.workspaceId) : '';
        if (acctEmail && acctId && itemEmail === acctEmail && itemId === acctId) return item;
        if (acctEmail && acctWorkspaceId && itemEmail === acctEmail && itemWorkspaceId === acctWorkspaceId) return item;
        if (poolLabel && item && item.label === poolLabel) return item;
      }
      return (poolEntry && poolEntry.rateLimits) ? poolEntry : null;
    }

    function getEffectiveCodexPoolEntry(acct, poolEntry) {
      var quotaEntry = getCodexQuotaAccount(acct, poolEntry);
      if (!poolEntry) {
        if (!quotaEntry) return null;
        return {
          ...quotaEntry,
          cooldownUntil: quotaEntry && quotaEntry.cooldownUntil ? quotaEntry.cooldownUntil : 0,
          cooldownRemainingMs: quotaEntry && typeof quotaEntry.cooldownRemainingMs === 'number' ? quotaEntry.cooldownRemainingMs : 0,
          modelCooldowns: quotaEntry && Array.isArray(quotaEntry.modelCooldowns) ? quotaEntry.modelCooldowns : []
        };
      }
      if (!quotaEntry) return poolEntry;
      return {
        ...poolEntry,
        state: quotaEntry.state || poolEntry.state,
        cooldownUntil: quotaEntry.cooldownUntil || poolEntry.cooldownUntil || 0,
        cooldownRemainingMs: typeof quotaEntry.cooldownRemainingMs === 'number'
          ? quotaEntry.cooldownRemainingMs
          : (typeof poolEntry.cooldownRemainingMs === 'number' ? poolEntry.cooldownRemainingMs : 0),
        planType: quotaEntry.planType || poolEntry.planType,
        modelCooldowns: Array.isArray(quotaEntry.modelCooldowns) ? quotaEntry.modelCooldowns : (Array.isArray(poolEntry.modelCooldowns) ? poolEntry.modelCooldowns : []),
        rateLimits: quotaEntry.rateLimits || poolEntry.rateLimits || null
      };
    }

    function getEffectivePoolEntry(channel, acct, poolEntry) {
      if (channel === 'codex') {
        return getEffectiveCodexPoolEntry(acct, poolEntry);
      }
      return poolEntry;
    }

    function getEffectiveBackendEntries(backendKey, entries) {
      if (!Array.isArray(entries)) return [];
      if (backendKey !== 'codex') return entries;
      return entries.map(function(entry) {
        return getEffectiveCodexPoolEntry(null, entry) || entry;
      });
    }

    function getBackendStateCounts(backendKey, backend) {
      if (!backend) {
        return { total: 0, ready: 0, cooling: 0, modelCooldown: 0, disabled: 0, unavailable: 0 };
      }
      var entries = getEffectiveBackendEntries(backendKey, backend.entries);
      if (backendKey !== 'codex' || !entries.length) {
        return {
          total: backend.total || 0,
          ready: backend.ready || 0,
          cooling: backend.cooling || 0,
          modelCooldown: backend.modelCooldown || 0,
          disabled: backend.disabled || 0,
          unavailable: backend.unavailable || 0
        };
      }

      var counts = { total: entries.length, ready: 0, cooling: 0, modelCooldown: 0, disabled: 0, unavailable: 0 };
      entries.forEach(function(entry) {
        if (!entry) return;
        if (entry.state === 'ready') counts.ready += 1;
        else if (entry.state === 'cooldown') counts.cooling += 1;
        else if (entry.state === 'model_cooldown') counts.modelCooldown += 1;
        else if (entry.state === 'disabled') counts.disabled += 1;
        else if (entry.state === 'unavailable') counts.unavailable += 1;
      });
      return counts;
    }

    var codexQuotaStatus = {
      loading: false,
      hasData: false,
      lastUpdatedAt: null,
      lastErrorAt: null,
    };

    function formatElapsedSince(value) {
      var date = parseDateValue(value);
      if (!date) return '--';
      var diffMs = Math.max(0, Date.now() - date.getTime());
      var sec = Math.round(diffMs / 1000);
      if (sec < 5) return 'just now';
      if (sec < 60) return sec + 's ago';
      var min = Math.round(sec / 60);
      if (min < 60) return min + 'm ago';
      var hr = Math.round(min / 60);
      if (hr < 24) return hr + 'h ago';
      var day = Math.round(hr / 24);
      return day + 'd ago';
    }

    function getCodexQuotaTimestamp(data) {
      if (data && data.timestamp) return data.timestamp;
      if (!data || !data.accounts) return null;
      var latest = null;
      for (var i = 0; i < data.accounts.length; i++) {
        var item = data.accounts[i];
        var updatedAt = item && item.rateLimits ? item.rateLimits.updatedAt : null;
        var parsed = parseDateValue(updatedAt);
        if (parsed && (!latest || parsed.getTime() > latest.getTime())) {
          latest = parsed;
        }
      }
      return latest ? latest.toISOString() : null;
    }

    function getCodexEffectiveRateLimit(codexQuotaAcct) {
      if (!codexQuotaAcct || !codexQuotaAcct.rateLimits) return null;
      return codexQuotaAcct.rateLimits.effective || null;
    }

    function getCodexRateLimitModels(codexQuotaAcct) {
      if (!codexQuotaAcct || !codexQuotaAcct.rateLimits || !Array.isArray(codexQuotaAcct.rateLimits.models)) return [];
      return codexQuotaAcct.rateLimits.models;
    }

    function buildCodexQuotaRefreshHtml() {
      if (selectedChannel !== 'codex' || codexSubView !== 'accounts') return '';
      var tone = 'var(--fg-2)';
      var parts = [];
      if (codexQuotaStatus.loading && codexQuotaData && codexQuotaStatus.hasData) {
        tone = 'var(--fg-2)';
        parts.push('Refreshing quota');
        parts.push('showing previous values');
      } else if (codexQuotaStatus.loading) {
        parts.push('Loading quota');
      } else if (codexQuotaStatus.lastUpdatedAt) {
        parts.push('Quota updated ' + formatElapsedSince(codexQuotaStatus.lastUpdatedAt));
      } else if (codexQuotaStatus.lastErrorAt && codexQuotaData) {
        tone = 'var(--warn)';
        parts.push('Using cached quota');
      } else if (codexQuotaStatus.lastErrorAt) {
        tone = 'var(--bad)';
        parts.push('Quota unavailable');
      } else {
        tone = 'var(--fg-3)';
        parts.push('Quota not loaded yet');
      }
      return '<div id="codex-quota-refresh-hint" style="margin-top:var(--sp-2);font-size:var(--text-xs);color:' + tone + '">' + esc(parts.join(' · ')) + '</div>';
    }

    function updateCodexQuotaRefreshHint() {
      var el = document.getElementById('codex-quota-refresh-hint');

        el.outerHTML = buildCodexQuotaRefreshHtml();
      }
    }

    function renderCodexRateLimitRows(codexQuotaAcct) {
      var models = getCodexRateLimitModels(codexQuotaAcct);
      var selected = null;
      for (var mi = 0; mi < models.length; mi++) {
        var candidate = models[mi];
        if (candidate && candidate.model === 'gpt-5.5' && candidate.effective) {
          selected = candidate;
          break;
        }
      }

      var effective = selected && selected.effective ? selected.effective : getCodexEffectiveRateLimit(codexQuotaAcct);
      if (!effective) return '';
      var limits = [];
      var h = '';
      var sourceLabel = effective.source === 'request' ? 'live request' : 'probe';
      var modelLabel = selected && selected.displayModel ? selected.displayModel : (effective.displayModel || effective.model || 'Unknown model');
      h += '<div style="margin-top:var(--sp-2);font-size:var(--text-xs);color:var(--fg-3)">';
      h += 'Quota · ' + esc(modelLabel) + ' · ' + esc(sourceLabel);
      h += '</div>';
      if (effective.primary) limits.push({ label: '5h limit', data: effective.primary, color: '#4fc3f7' });
      if (effective.secondary) limits.push({ label: 'Weekly limit', data: effective.secondary, color: '#81c784' });
      for (var li = 0; li < limits.length; li++) {
        var lim = limits[li];
        var leftRaw = Math.max(0, 100 - lim.data.usedPercent);
        var leftPct = Math.max(0, +leftRaw.toFixed(1));
        var leftWidth = Math.max(0, Math.min(100, leftPct));
        var leftLabel = (leftRaw > 0 && leftRaw < 0.1) ? '<0.1% left' : (leftPct + '% left');
        var resetInfo = '';
        if (lim.data.resetsAt) {
          var resetDate = parseDateValue(lim.data.resetsAt);
          if (resetDate) {
            var resetHH = String(resetDate.getHours()).padStart(2, '0');
            var resetMM = String(resetDate.getMinutes()).padStart(2, '0');
            var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            resetInfo = ' (resets ' + resetHH + ':' + resetMM + ' on ' + resetDate.getDate() + ' ' + months[resetDate.getMonth()] + ')';
          }
        }
        h += '<div style="margin-top:var(--sp-2)">';
        h += '<div style="display:flex;justify-content:space-between;font-size:var(--text-xs);color:var(--fg-2);margin-bottom:3px">';
        h += '<span>' + esc(lim.label) + '</span>';
        h += '<span>' + esc(leftLabel) + esc(resetInfo) + '</span>';
        h += '</div>';
        h += '<div class="progress-track" style="height:5px"><div class="progress-fill" style="width:' + leftWidth + '%;background:' + lim.color + '"></div></div>';
        h += '</div>';
      }
      return h;
    }

    function patchVisibleCodexQuota() {

      { label: 'Claude Opus 4.6', color: '#a78bfa', match: function(n) { var l = n.toLowerCase(); return l.indexOf('claude') >= 0 && l.indexOf('opus') >= 0; } },

    function findKeyModel(models, filter) {

          var quotaAcct = (selectedChannel === 'antigravity' && acct.email) ? getQuotaAccount(acct.email) : null;
          var codexQuotaAcct = (selectedChannel === 'codex') ? getCodexQuotaAccount(acct, effectivePoolEntry) : null;

          h += '<div style="padding:var(--sp-3) 0">';

          h += '<div style="display:flex;align-items:center;justify-content:space-between;gap:var(--sp-2)">';

    // ── Settings tab ──
    let activeSettingsGroup = 'bridge';

    function renderSettings(data) {
      // data is now a structured object with groups
      const groups = (data.groups || []).filter(function(g) { return g.items && g.items.length > 0; });
      const nav = document.getElementById('settings-nav');
      const content = document.getElementById('settings-content');
      if (groups.length > 0 && !groups.some(function(g) { return g.id === activeSettingsGroup; })) {
        activeSettingsGroup = groups[0].id;
      }

      // Build nav
      nav.innerHTML = groups.map(function(g) {
        return '<button class="settings-nav-item' + (g.id === activeSettingsGroup ? ' active' : '') + '" data-group="' + esc(g.id) + '" onclick="switchSettingsGroup(\'' + esc(g.id) + '\')">' + esc(g.label) + '</button>';
      }).join('');

      // Build content groups
      var ch = '';
      for (var gi = 0; gi < groups.length; gi++) {
        var g = groups[gi];
        ch += '<div class="settings-group' + (g.id === activeSettingsGroup ? ' active' : '') + '" id="sg-' + esc(g.id) + '">';
        ch += '<div class="settings-group-title">' + esc(g.label) + '</div>';
        if (g.desc) ch += '<div class="settings-group-desc">' + esc(g.desc) + '</div>';
        for (var si = 0; si < g.items.length; si++) {
          var item = g.items[si];
          ch += '<div class="setting-item">';
          ch += '<div class="setting-top">';
          ch += '<div><div class="setting-label">' + esc(item.label) + '</div>';
          if (item.desc) ch += '<div class="setting-desc">' + esc(item.desc) + '</div>';
          ch += '</div>';
          // Right side: value or control
          if (item.type === 'toggle' || item.type === 'enumToggle' || item.type === 'readonlyToggle') {
            var on = Boolean(item.value);
            var toggleClasses = 'toggle ' + (on ? 'on' : '') + (item.type === 'readonlyToggle' ? ' readonly' : '');
            ch += '<div class="' + toggleClasses + '" data-key="' + esc(item.key || '') + '"';
            if (item.type === 'enumToggle') {
              ch += ' data-on-value="' + esc(item.onValue || '') + '" data-off-value="' + esc(item.offValue || '') + '"';
            }
            if (item.type === 'readonlyToggle') {
              ch += ' data-readonly="1"';
            }
            ch += ' onclick="toggleSetting(this)">';
            ch += '<span class="toggle-label">' + (on ? 'On' : 'Off') + '</span>';
            ch += '<div class="toggle-track"></div></div>';
          } else if (item.type === 'commandToggle') {
            var commandOn = Boolean(item.value);
            ch += '<div class="toggle ' + (commandOn ? 'on' : '') + (item.disabled ? ' disabled' : '') + '" data-on-command="' + esc(item.onCommand || '') + '" data-off-command="' + esc(item.offCommand || '') + '" data-disabled="' + (item.disabled ? '1' : '0') + '" data-pending="' + (item.pending ? '1' : '0') + '" onclick="toggleCommandSetting(this)">';
            ch += '<span class="toggle-label">' + (commandOn ? 'On' : 'Off') + '</span>';
            ch += '<div class="toggle-track"></div></div>';
          } else if (item.type === 'number') {
            if (item.key === 'port') {
              ch += '<input class="setting-input" type="number" value="' + esc(item.value) + '" data-key="' + esc(item.key) + '" onkeydown="handlePortInputKey(event,this)" onblur="commitPortSetting(this)" />';
            } else {
              ch += '<input class="setting-input" type="number" value="' + esc(item.value) + '" data-key="' + esc(item.key) + '" onchange="updateNumberSetting(this)" />';
            }
          } else if (item.type === 'select') {
            ch += '<div class="setting-control-cluster">';
            if (item.badgeValue) {
              var selectBadgeCls = item.badgeTone === 'ok' ? 'setting-badge-ok' : item.badgeTone === 'warn' ? 'setting-badge-warn' : item.badgeTone === 'info' ? 'setting-badge-info' : '';
              ch += '<span class="setting-badge ' + selectBadgeCls + '">' + esc(item.badgeValue) + '</span>';
            }
            ch += '<div class="setting-select-wrap">';
            ch += '<select class="setting-input setting-input-select' + (item.compact ? ' setting-input-select-compact' : '') + '" data-key="' + esc(item.key) + '" onchange="updateStringSetting(this)">';
            if (item.options) {
              for (var oi = 0; oi < item.options.length; oi++) {
                var opt = item.options[oi];
                ch += '<option value="' + esc(opt.value) + '"' + (opt.value === item.value ? ' selected' : '') + '>' + esc(opt.label) + '</option>';
              }
            }
            ch += '</select>';
            ch += '</div>';
            ch += '</div>';
          } else if (item.type === 'badge') {
            var badgeCls = item.tone === 'ok' ? 'setting-badge-ok' : item.tone === 'warn' ? 'setting-badge-warn' : item.tone === 'info' ? 'setting-badge-info' : '';
            ch += '<span class="setting-badge ' + badgeCls + '">' + esc(item.value) + '</span>';
          } else if (item.type === 'actions') {
            ch += '<div class="setting-actions">';
            if (item.actions) {
              for (var ai = 0; ai < item.actions.length; ai++) {
                var action = item.actions[ai];
                ch += '<button class="btn btn-' + esc(action.tone || 'secondary') + '" onclick="runCmd(\'' + esc(action.command) + '\')"' + (action.disabled ? ' disabled' : '') + '>' + esc(action.label) + '</button>';
              }
            }
            ch += '</div>';
          } else {
            // readonly
            ch += '<span class="setting-val">' + esc(item.value) + '</span>';
          }
          ch += '</div>'; // setting-top
          // Path input (full-width below label)
          if (item.type === 'path') {
            ch += '<input class="setting-input-wide" type="text" value="' + esc(item.value) + '" placeholder="' + esc(item.placeholder || '') + '" data-key="' + esc(item.key) + '" onchange="updateStringSetting(this)" />';
          }
          if (item.hint) {
            ch += '<div class="setting-hint">' + esc(item.hint) + '</div>';
          }
          ch += '</div>'; // setting-item
        }
        ch += '</div>'; // settings-group
      }
      content.innerHTML = ch;
    }

    function switchSettingsGroup(id) {
      activeSettingsGroup = id;
      document.querySelectorAll('.settings-nav-item').forEach(function(el) {
        el.classList.toggle('active', el.dataset.group === id);
      });
      document.querySelectorAll('.settings-group').forEach(function(el) {
        el.classList.toggle('active', el.id === 'sg-' + id);
      });
    }

    function toggleSetting(el) {
      if (el.dataset.readonly === '1') return;
      const key = el.dataset.key;
      const isOn = el.classList.contains('on');
      const newVal = !isOn;
      const mappedValue = newVal
        ? (el.dataset.onValue || '')
        : (el.dataset.offValue || '');
      el.classList.toggle('on');
      el.querySelector('.toggle-label').textContent = newVal ? 'On' : 'Off';
      vscode.postMessage({
        type: 'updateSetting',
        key: key,
        value: el.dataset.onValue || el.dataset.offValue ? mappedValue : newVal
      });
    }

    function toggleCommandSetting(el) {
      if (el.dataset.disabled === '1' || el.dataset.pending === '1') return;
      var isOn = el.classList.contains('on');
      var nextOn = !isOn;
      var cmd = isOn ? el.dataset.offCommand : el.dataset.onCommand;
      if (!cmd) return;
      el.dataset.pending = '1';
      el.classList.add('pending');
      el.classList.toggle('on', nextOn);
      el.querySelector('.toggle-label').textContent = nextOn ? 'On' : 'Off';
      runCmd(cmd);
    }

    function updateNumberSetting(el) {
      var key = el.dataset.key;
      var val = parseInt(el.value, 10);
      if (!isNaN(val)) {
        vscode.postMessage({ type: 'updateSetting', key: key, value: val });
      }
    }

    function commitPortSetting(el) {
      updateNumberSetting(el);
    }

    function handlePortInputKey(event, el) {
      if (event.key === 'Enter') {
        event.preventDefault();
        commitPortSetting(el);
      }
    }

    function updateStringSetting(el) {
      var key = el.dataset.key;
      vscode.postMessage({ type: 'updateSetting', key: key, value: el.value.trim() });
    }

    // ── Dialog ──
    var dlgOAuthTab = 'oauth'; // 'oauth' or 'token'

      dlgMode = mode || 'add';
      dlgEditIndex = typeof index === 'number' ? index : -1;
      const d = CH[ch];
      const title = document.getElementById('dlg-title');
      const fields = document.getElementById('dlg-fields');
      const okBtn = document.getElementById('dlg-ok');
      const channelState = getChannelState(allData || {}, ch);
      dlgInitialData = dlgMode === 'edit' && dlgEditIndex >= 0
        ? (channelState.accounts[dlgEditIndex] || null)
        : null;

      // Reset action bar visibility + default label
      document.querySelector('#dlg .dialog-actions').style.display = '';

      if (ch === 'antigravity') {
        title.textContent = (dlgMode === 'edit' ? 'Edit ' : 'Add ') + d.label + ' Account';
        antigravityDraft = { proxyUrl: '' };
        dlgOAuthTab = 'oauth';
        renderAntigravityDlg();
      } else if (ch === 'codex') {
        title.textContent = (dlgMode === 'edit' ? 'Edit ' : 'Add ') + d.label + ' Account';

        renderCodexDlg();
      } else if (d.mode === 'sync') {
        title.textContent = (dlgMode === 'edit' ? 'Edit ' : 'Add ') + d.label + ' Token';

      let h = '';

      while (i < rawLogLines.length) {
        const line = rawLogLines[i];
        if (isHeartbeatLine(line)) {
          // Count consecutive heartbeat lines
          let count = 0;
          const startIdx = i;
          while (i < rawLogLines.length && isHeartbeatLine(rawLogLines[i])) {
            count++;
            i++;
          }
          if (showHeartbeat) {
            // Show all heartbeat lines when toggle is on
            for (let j = startIdx; j < startIdx + count; j++) {
              h += '<div class="log-line log-line-debug">' + esc(rawLogLines[j]) + '</div>';
            }
          } else {
            // Collapsed summary
            const firstLine = rawLogLines[startIdx];

            } else {
              h += '<div class="log-line log-line-debug" style="opacity:0.5">💓 Heartbeat ×' + count + ' (collapsed)</div>';

          }
        } else {
          let cls = 'log-line';
          if (line.includes('[ERROR]') || line.includes('[error]')) cls += ' log-line-error';
          else if (line.includes('[WARN]') || line.includes('[warn]')) cls += ' log-line-warn';
          else if (line.includes('[DEBUG]') || line.includes('[debug]')) cls += ' log-line-debug';

    function getModelCooldownDisplay(entry) {
      var active = getActiveModelCooldowns(entry);
      if (!active.length) {
        return { label: 'Model Hold', summary: '' };
